<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Info Editor</title>
    <script src="libraries/js/jquery-min.js"></script>
    <script src="libraries/js/moment.min.js"></script>
    <script src="libraries/js/numeral.min.js"></script>
    <script>if (window.module) module = window.module;</script>
    <link rel="stylesheet" href="libraries/css/w3.min.css">
    <link rel="stylesheet" href="libraries/css/all.min.css">
    <link rel="stylesheet" href="video-info.css">
</head>
<body>
<div class="editorTopBar">
    <div class="editorTopBarLeft">
        <h1 class="editorTitle"><i class="fa fa-film"></i> Video Info Editor</h1>
    </div>
    <div class="editorTopBarActions">
        <button class="w3-button" onclick="displayFilterModal()"><i class="fa fa-filter"></i> Filter</button>
        <button class="w3-button" onclick="exportData()"><i class="fa fa-file-export"></i> Export</button>
    </div>
</div>

<div class="editorContent">
    <div id="videoList" class="editorVideoList"></div>
</div>

<div id="videoModal" class="w3-modal">
    <div class="w3-modal-content">
        <div class="w3-container w3-white editorModalBody">
            <span onclick="closeVideoModal()"
                  class="w3-button w3-display-topright">&times;</span>
            <br>
            <video controls id="modalVideo" width="95%"></video>
        </div>
    </div>
</div>

<div id="exportModal" class="w3-modal">
    <div class="w3-modal-content">
        <div class="w3-container w3-white editorModalBody">
            <span onclick="closeExportModal()"
                  class="w3-button w3-display-topright">&times;</span>
            <br>
            <textarea id="exportText" style="width: 95%; height: 450px"></textarea>
        </div>
    </div>
</div>

<div id="filterModal" class="w3-modal">
    <div class="w3-modal-content">
        <div class="w3-container w3-white editorModalBody">
            <h3>Filters</h3>
            <span onclick="setFilters()"
                  class="w3-button w3-display-topright">&times;</span>
            <br>
            <label for="filterTypeSelect">Type</label>
            <select id="filterTypeSelect">
            <option selected value=".*">Any</option>
            <option value="cityscape">Cityscape</option>
            <option value="landscape">Landscape</option>
            <option value="space">Space</option>
            <option value="underwater">Underwater</option>
        </select>
            <br><br>
            <label for="filterToDSelect">Time of Day</label>
            <select id="filterToDSelect">
            <option selected value=".*">Any</option>
            <option value="day">Day</option>
            <option value="night">Night</option>
            <option value="undefined">undefined</option>
        </select>
            <br><br>
        </div>
    </div>
</div>

<script src="video-info.js"></script>
</body>
</html>
